name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Pipeline (Dry Run)
      run: |
        python src/01_simulate_logs.py
        python src/02_simulate_red_team.py
        python src/03_feature_engineering.py
        python src/04_nlp_features.py
        python src/05_merge_features.py
        python src/06_train_models.py
